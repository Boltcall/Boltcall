<!DOCTYPE html>
<html>
<head>
    <title>Test Retell API</title>
</head>
<body>
    <h1>Testing Retell API Connection</h1>
    <label>
        Retell API key
        <input id="api-key" type="password" placeholder="key_..." autocomplete="off" />
    </label>
    <button id="run-test" type="button">Test voices</button>
    <div id="result"></div>

    <script>
        async function testRetellAPI() {
            const resultDiv = document.getElementById('result');
            const apiKey = document.getElementById('api-key').value.trim();
            if (!apiKey) {
                resultDiv.innerHTML = '<p>Enter a Retell API key for this local test.</p>';
                return;
            }
            
            try {
                console.log('Testing Retell API...');
                
                const response = await fetch('https://cors-anywhere.herokuapp.com/https://api.retellai.com/v2/voices', {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                });

                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('API Response:', data);
                
                resultDiv.innerHTML = `
                    <h2>✅ API Connection Successful!</h2>
                    <p>Found ${data.items.length} voices</p>
                    <p>First voice: ${data.items[0].name} (${data.items[0].accent}, ${data.items[0].gender})</p>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <h2>❌ API Connection Failed</h2>
                    <p>Error: ${error.message}</p>
                `;
            }
        }

        document.getElementById('run-test').addEventListener('click', testRetellAPI);
    </script>
</body>
</html>
