[build]
  publish = "dist"
  command = "npm run build:prerender"

# Service worker must not be cached by browser/CDN
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[redirects]]
  from = "http://boltcall.org/*"
  to = "https://boltcall.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.boltcall.org/*"
  to = "https://boltcall.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.boltcall.org/*"
  to = "https://boltcall.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://boltcall.netlify.app/*"
  to = "https://boltcall.org/:splat"
  status = 301
  force = true

# SEO: collapse cannibalizing blog duplicates onto stronger survivor pages.
# Both source URLs were "Crawled - currently not indexed" in GSC because they
# near-duplicate the targets. 301 transfers ranking equity to the survivor.
[[redirects]]
  from = "/blog/why-website-speed-is-everything"
  to = "/blog/why-speed-matters/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/why-website-speed-is-everything/"
  to = "/blog/why-speed-matters/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/will-receptionists-be-replaced-by-ai"
  to = "/blog/is-ai-receptionist-worth-it/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/will-receptionists-be-replaced-by-ai/"
  to = "/blog/is-ai-receptionist-worth-it/"
  status = 301
  force = true

# Pretty lead webhook URL: POST /l/{user_id} → lead-webhook function
[[redirects]]
  from = "/l/:userId"
  to = "/.netlify/functions/lead-webhook/:userId"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "VITE_RETELL_PUBLIC_KEY"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."agent-test"]
  timeout = 300

[functions."agent-self-heal"]
  timeout = 300

# Run message dispatcher every 5 minutes to process due scheduled_messages
[functions."message-dispatcher"]
  schedule = "*/5 * * * *"

# Run sequence processor every 5 minutes to advance follow-up enrollments
[functions."sequence-processor"]
  schedule = "*/5 * * * *"

# Run email inbox poller every 3 minutes to fetch new lead emails
[functions."email-inbox-poller"]
  schedule = "*/3 * * * *"

# Send daily lead summary email to all active users at 07:00 UTC (10 AM Israel / 3 AM EST)
[functions."daily-lead-summary"]
  schedule = "0 7 * * *"

# ─── Agency OS scheduled functions (Phase F — Layer 2 backbone) ─────────────
# Backbone for the n8n workflows. n8n is the orchestration ergonomic; these
# are the load-bearing backups so the OS degrades gracefully if n8n is down.
# Per plan §4 "Failure mode: if n8n goes down, the OS degrades gracefully —
# Netlify scheduled functions are the backup for the time-critical workflows".

# Weekly creative refresh — Mondays 06:00 UTC (Bolt System SKU only).
[functions."agency-cron-monday-creative"]
  schedule = "0 6 * * 1"

# Friday auto-report — every hour from 06:00 to 15:00 UTC on Fridays; the
# function filters per client.timezone to only fan in the 06:00-08:00 local
# window. Dedupe gate via report_sent event presence.
[functions."agency-cron-friday-report"]
  schedule = "0 6-15 * * 5"

# Monthly optimization brief — 1st of every month, 09:00 UTC.
[functions."agency-cron-monthly-optimization"]
  schedule = "0 9 1 * *"

# Daily QA audit — 02:00 UTC (global trough).
[functions."agency-cron-daily-qa-audit"]
  schedule = "0 2 * * *"

# Hourly delivery monitor — kicks the in-process loop in agency-delivery-monitor.
[functions."agency-cron-hourly-monitor"]
  schedule = "@hourly"

# Post-ship critic with auto-revert — every 15 minutes. The window-end check
# is the gate; most ticks see 0–3 candidates.
[functions."agency-post-ship-watcher"]
  schedule = "*/15 * * * *"

# Why-Log backfill — every hour. Generates plain-English explanations for
# warn+ severity events that don't have one yet. Hard daily cap = 1000 events.
[functions."agency-event-why-explanation-backfill"]
  schedule = "@hourly"

# BENCHMARK curator — Sundays 04:00 UTC. Writes scenario proposals to disk;
# NEVER edits BENCHMARK.md directly (human review required).
[functions."agency-cron-benchmark-curation"]
  schedule = "0 4 * * 0"

# Netlify handles /.netlify/functions/* routing automatically — no redirect needed

# Long cache for hashed static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
