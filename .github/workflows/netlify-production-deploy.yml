name: Netlify Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_prerender:
        description: 'Run the slower full prerender build before deploying'
        required: false
        default: false
        type: boolean

concurrency:
  group: netlify-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          FULL_PRERENDER: ${{ github.event_name == 'workflow_dispatch' && inputs.full_prerender || 'false' }}
        shell: bash
        run: |
          if [[ "$FULL_PRERENDER" == "true" ]]; then
            echo "Running full prerender build"
            npm run build:prerender
          else
            echo "Running fast production build"
            npm run build:fast
          fi

      - name: Build functions
        run: npx netlify functions:build --src netlify/functions --functions .netlify-fn-build

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify deploy --prod --dir=dist --functions .netlify-fn-build --timeout 120 --message "GitHub Actions deploy ${GITHUB_SHA}"

      - name: Smoke test live function
        shell: bash
        run: |
          status=$(curl -sS -o /tmp/saas-v2-leads-response.txt -w '%{http_code}' \
            -X OPTIONS \
            -H 'Origin: https://boltcall.org' \
            https://boltcall.org/.netlify/functions/saas-v2-leads)

          if [[ "$status" == "200" ]] && grep -qi '<!doctype html' /tmp/saas-v2-leads-response.txt; then
            echo "Function smoke test hit the SPA fallback instead of the backend."
            cat /tmp/saas-v2-leads-response.txt
            exit 1
          fi

          case "$status" in
            204|401|403|405)
              echo "Function smoke test passed with HTTP $status"
              ;;
            *)
              echo "Unexpected function smoke test status: $status"
              cat /tmp/saas-v2-leads-response.txt
              exit 1
              ;;
          esac
